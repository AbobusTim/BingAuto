name: Deploy (Template)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy secrets
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SYSTEMD_SERVICE: ${{ secrets.SYSTEMD_SERVICE }}
          SYSTEMD_USER: ${{ secrets.SYSTEMD_USER }}
          APP_ENV_BASE64: ${{ secrets.APP_ENV_BASE64 }}
        run: |
          set -euo pipefail

          require_non_empty() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "::error title=Missing secret::$name is empty or missing"
              exit 1
            fi
            echo "$name: present"
          }

          require_non_empty "SSH_HOST" "$SSH_HOST"
          require_non_empty "SSH_USER" "$SSH_USER"
          require_non_empty "SSH_PRIVATE_KEY" "$SSH_PRIVATE_KEY"
          require_non_empty "DEPLOY_PATH" "$DEPLOY_PATH"

          echo "SYSTEMD_SERVICE: ${SYSTEMD_SERVICE:+present}"
          echo "SYSTEMD_USER: ${SYSTEMD_USER:+present}"
          echo "APP_ENV_BASE64: ${APP_ENV_BASE64:+present}"

      - name: Prepare SSH key
        shell: bash
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null

      - name: Test SSH connection
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          CLEAN_SSH_HOST="$(printf '%s' "$SSH_HOST" | tr -d '\r\n')"
          CLEAN_SSH_USER="$(printf '%s' "$SSH_USER" | tr -d '\r\n')"

          echo "Testing SSH to host: $CLEAN_SSH_HOST"
          echo "Testing SSH as user: $CLEAN_SSH_USER"

          ssh -vvv -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            "$CLEAN_SSH_USER@$CLEAN_SSH_HOST" "echo SSH connected"

      - name: Deploy over SSH
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SYSTEMD_SERVICE: ${{ secrets.SYSTEMD_SERVICE }}
          SYSTEMD_USER: ${{ secrets.SYSTEMD_USER }}
          APP_ENV_BASE64: ${{ secrets.APP_ENV_BASE64 }}
          REPO_URL: https://github.com/${{ github.repository }}.git
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          CLEAN_SSH_HOST="$(printf '%s' "$SSH_HOST" | tr -d '\r\n')"
          CLEAN_SSH_USER="$(printf '%s' "$SSH_USER" | tr -d '\r\n')"
          APP_DIR="$(printf '%s' "$DEPLOY_PATH" | tr -d '\r\n')"
          SERVICE_NAME="$(printf '%s' "$SYSTEMD_SERVICE" | tr -d '\r\n')"
          SERVICE_USER="$(printf '%s' "$SYSTEMD_USER" | tr -d '\r\n')"

          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            "$CLEAN_SSH_USER@$CLEAN_SSH_HOST" \
            APP_DIR="$APP_DIR" \
            REPO_URL="$REPO_URL" \
            BRANCH="$BRANCH" \
            SERVICE_NAME="$SERVICE_NAME" \
            SERVICE_USER="$SERVICE_USER" \
            APP_ENV_BASE64="$APP_ENV_BASE64" \
            'bash -se' <<'REMOTE'
          set -euo pipefail

          echo "Deploy dir: $APP_DIR"
          echo "Branch: $BRANCH"

          if [ ! -d "$APP_DIR/.git" ]; then
            mkdir -p "$APP_DIR"
            git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
          fi

          cd "$APP_DIR"
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"
          git reset --hard "origin/$BRANCH"

          if ! python3 -m venv .venv; then
            apt-get update
            apt-get install -y python3-venv
            python3 -m venv .venv
          fi
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

          if [ -n "${APP_ENV_BASE64:-}" ]; then
            printf '%s' "$APP_ENV_BASE64" | base64 -d > .env
          fi

          if [ -n "${SERVICE_NAME:-}" ]; then
            if [ -z "${SERVICE_USER:-}" ] || [ "$SERVICE_USER" = "root" ]; then
              systemctl restart "$SERVICE_NAME"
            else
              sudo -u "$SERVICE_USER" systemctl --user restart "$SERVICE_NAME"
            fi
          fi

          echo "Deploy completed."
          REMOTE
