name: Deploy (Template)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            APP_DIR="${{ secrets.DEPLOY_PATH }}"
            REPO_URL="https://github.com/${{ github.repository }}.git"
            BRANCH="${{ github.ref_name }}"
            SYSTEMD_SERVICE="${{ secrets.SYSTEMD_SERVICE }}"
            SYSTEMD_USER="${{ secrets.SYSTEMD_USER }}"
            APP_ENV_BASE64="${{ secrets.APP_ENV_BASE64 }}"

            if [ -z "$APP_DIR" ] || [ -z "$BRANCH" ]; then
              echo "Missing one of required secrets: DEPLOY_PATH / SSH_*"
              exit 1
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$APP_DIR"
              git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            python3 -m venv .venv || true
            . .venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt

            if [ -n "$APP_ENV_BASE64" ]; then
              echo "$APP_ENV_BASE64" | base64 -d > .env
            fi

            if [ -n "$SYSTEMD_SERVICE" ]; then
              if [ -z "$SYSTEMD_USER" ] || [ "$SYSTEMD_USER" = "root" ]; then
                systemctl restart "$SYSTEMD_SERVICE"
              else
                sudo -u "$SYSTEMD_USER" systemctl --user restart "$SYSTEMD_SERVICE"
              fi
            fi

            echo "Deploy completed."
