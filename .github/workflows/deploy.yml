name: Deploy (Template)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            APP_DIR="${{ secrets.SERVER_APP_DIR }}"
            REPO_URL="${{ secrets.DEPLOY_REPO_URL }}"
            BRANCH="${{ secrets.DEPLOY_BRANCH }}"

            if [ -z "$APP_DIR" ] || [ -z "$REPO_URL" ] || [ -z "$BRANCH" ]; then
              echo "Missing one of required secrets: SERVER_APP_DIR / DEPLOY_REPO_URL / DEPLOY_BRANCH"
              exit 1
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$APP_DIR"
              git clone --branch "$BRANCH" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            python3 -m venv .venv || true
            . .venv/bin/activate
            pip install --upgrade pip
            pip install -r requirements.txt

            # TODO: Replace with your real restart command
            # Example: systemctl restart bingx-bot.service
            echo "Deploy completed. Set service restart command in workflow."
